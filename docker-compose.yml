version: "3.9"
services:
  backend:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports: ["8000:8000"]
    environment:
      - ENV=dev
    volumes:
      - ./backend:/app
  frontend:
    build: ./frontend
    ports: ["5173:5173"]
    command: ["npm","run","dev","--","--host"]
    volumes:
      - ./frontend:/app
    environment:
      - VITE_BACKEND_URL=http://localhost:8000
